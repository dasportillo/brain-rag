name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      # Unit tests are model-free (they import only transcripts.mjs + store.mjs, both
      # built-in-only), so no `npm install` is needed and CI stays fast.
      - name: Run tests
        run: node --test
